<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 Suka Aku Gak?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background-color: #ffffff;
      color: #333333;
      font-family: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .card {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .main-emoji {
      font-size: 4rem;
      display: block;
      margin-bottom: 16px;
      animation: floatBloom 2s ease-in-out infinite;
    }

    @keyframes floatBloom {

      0%,
      100% {
        transform: translateY(0) scale(1) rotate(0deg);
      }

      50% {
        transform: translateY(-8px) scale(1.08) rotate(12deg);
      }
    }

    @keyframes heartbeat {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }
    }

    .question {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 8px;
      display: inline-block;
      min-height: 2.2rem;
    }

    .question::after,
    .answer-title::after {
      content: '';
      display: inline-block;
      width: 2px;
      height: 1.4rem;
      background-color: transparent;
      margin-left: 4px;
      vertical-align: middle;
    }

    .question.typing::after,
    .question.done::after,
    .answer-title.typing::after,
    .answer-title.done::after {
      animation: blink-cursor 0.8s step-end infinite;
    }

    @keyframes blink-cursor {
      0%, 100% { background-color: #333; }
      50% { background-color: transparent; }
    }

    .sub-text {
      font-size: 1rem;
      color: #666666;
      margin-bottom: 30px;
    }

    .btn-wrap {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      min-height: 150px;
      /* space to accommodate growing button */
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .btn-wrap.show {
      opacity: 1;
      pointer-events: auto;
    }

    .btn-yes {
      background-color: #ff4f8b;
      color: #ffffff;
      border: none;
      border-radius: 20px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: normal;
      max-width: 90vw;
      text-align: center;
    }

    .btn-yes:hover {
      background-color: #e8003d;
    }

    .btn-no {
      background-color: #f0f0f0;
      color: #333333;
      border: 1px solid #cccccc;
      border-radius: 20px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: normal;
      max-width: 90vw;
      text-align: center;
    }

    .btn-no:hover {
      background-color: #e0e0e0;
    }

    /* Answer screen */
    #answer-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background-color: #ffffff;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    #answer-screen.show {
      display: flex;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes popIn {
      0% {
        transform: scale(0.6);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .answer-emoji {
      font-size: 5rem;
      display: block;
      margin-bottom: 20px;
      animation: heartbeat 1.5s ease-in-out infinite;
    }

    .answer-title {
      font-size: 1.6rem;
      font-weight: 600;
      color: #333333;
      max-width: 320px;
      line-height: 1.4;
      display: inline-block;
    }

    /* Burst heart animation */
    .burst-heart {
      position: fixed;
      pointer-events: none;
      font-size: 1.8rem;
      z-index: 200;
      animation: burst 1.2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    }

    @keyframes burst {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(0deg);
      }

      100% {
        opacity: 0;
        transform: translate(var(--dx), var(--dy)) scale(0.3) rotate(var(--dr));
      }
    }

    /* Music controller */
    .music-control {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 79, 139, 0.25);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 32px 0 rgba(255, 79, 139, 0.15);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .music-control:hover {
      transform: scale(1.15) rotate(15deg);
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(255, 79, 139, 0.5);
      box-shadow: 0 8px 32px 0 rgba(255, 79, 139, 0.3);
    }

    .music-control:active {
      transform: scale(0.95);
    }

    .music-icon {
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spin 5s linear infinite;
      animation-play-state: paused;
      user-select: none;
    }

    .music-control.playing .music-icon {
      animation-play-state: running;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* Audio element hidden */
    #backsound {
      display: none;
    }

    /* Overlay blocker */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: transparent;
      transition: opacity 0.4s ease;
    }

    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Hint arrow pointing to music button */
    .hint {
      position: fixed;
      top: 75px;
      right: 18px;
      z-index: 1001;
      text-align: center;
      animation: bounceHint 1s ease-in-out infinite;
    }

    .hint-arrow {
      font-size: 1.5rem;
      display: block;
    }

    .hint-text {
      font-size: 0.85rem;
      font-weight: 600;
      color: #ff4f8b;
      white-space: nowrap;
    }

    .hint.hidden {
      display: none;
    }

    @keyframes bounceHint {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* Disabled state for card */
    .card.disabled {
      opacity: 0.3;
      pointer-events: none;
      filter: blur(10px);
      transition: all 0.4s ease;
    }

    .card.enabled {
      opacity: 1;
      pointer-events: auto;
      filter: none;
      transition: all 0.4s ease;
    }

    /* Mobile Responsiveness */
    @media (max-width: 480px) {
      .main-emoji { font-size: 3rem; margin-bottom: 12px; }
      .question { font-size: 1.4rem; min-height: 1.8rem; }
      .question::after, .answer-title::after { height: 1.1rem; }
      .sub-text { font-size: 0.9rem; margin-bottom: 24px; }
      .btn-wrap { gap: 12px; }
      .answer-emoji { font-size: 4rem; }
      .answer-title { font-size: 1.3rem; max-width: 280px; }
      .music-control { width: 45px; height: 45px; top: 15px; right: 15px; }
      .music-icon { font-size: 1.4rem; }
      .hint { top: 65px; right: 12px; }
      .hint-arrow { font-size: 1.3rem; }
      .hint-text { font-size: 0.8rem; }
    }
  </style>
</head>

<body>

  <!-- Overlay to block clicks -->
  <div id="overlay"></div>

  <!-- Hint arrow -->
  <div class="hint" id="hint">
    <span class="hint-arrow">☝️</span>
    <span class="hint-text">klik ini dulu 🌸</span>
  </div>

  <!-- Music Toggle Button -->
  <div id="music-control" class="music-control" onclick="startMusic()">
    <span class="music-icon">🌸</span>
  </div>
  <audio id="backsound" src="backsound.mp3" loop preload="auto"></audio>

  <div class="card disabled" id="main-card">
    <span class="main-emoji">🌸</span>
    <div class="question" id="question"></div>

    <div class="btn-wrap">
      <button class="btn-yes" id="btn-yes" onclick="showAnswer()">
        💖 Suka bangettt!
      </button>
      <button class="btn-no" id="btn-no" onclick="growYes()">
        😅 Engga...
      </button>
    </div>
  </div>

  <div id="answer-screen">
    <span class="answer-emoji">🌸</span>
    <div class="answer-title" id="answer-title"></div>
  </div>

  <script>
    let clickCount = 0;

    function growYes() {
      clickCount++;
      const btnYes = document.getElementById('btn-yes');
      const btnNo = document.getElementById('btn-no');

      // Grow yes button
      const padYYes = 12 + clickCount * 8;
      const padXYes = 24 + clickCount * 16;
      const fsYes = 1 + clickCount * 0.2;
      btnYes.style.padding = `${padYYes}px ${padXYes}px`;
      btnYes.style.fontSize = `${fsYes}rem`;

      // Shrink no button
      const padYNo = Math.max(4, 12 - clickCount * 2);
      const padXNo = Math.max(8, 24 - clickCount * 4);
      const fsNo = Math.max(0.3, 1 - clickCount * 0.15);
      btnNo.style.padding = `${padYNo}px ${padXNo}px`;
      btnNo.style.fontSize = `${fsNo}rem`;

      if (fsNo <= 0.3) {
        btnNo.style.opacity = '0.5';
      }
    }

    function showAnswer() {
      // confetti burst from current yes button position
      const btnYes = document.getElementById('btn-yes');
      const rect = btnYes.getBoundingClientRect();
      const startX = rect.left + rect.width / 2;
      const startY = rect.top + rect.height / 2;

      const emojis = ['💗', '💕', '✨', '🌸', '💞', '💖', '🎉', '🩷', '💝', '🌹'];
      for (let i = 0; i < 35; i++) {
        const el = document.createElement('div');
        el.className = 'burst-heart';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = startX + 'px';
        el.style.top = startY + 'px';
        const angle = Math.random() * Math.PI * 2;
        const dist = 100 + Math.random() * 200;
        el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
        el.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
        el.style.setProperty('--dr', (Math.random() * 360) + 'deg');
        el.style.animationDelay = Math.random() * 0.15 + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1200);
      }

      setTimeout(() => {
        document.getElementById('answer-screen').classList.add('show');
        typeAnswer();
      }, 350);
    }

    // HTML5 Audio - Local backsound
    const audio = document.getElementById('backsound');
    const musicControl = document.getElementById('music-control');
    const overlay = document.getElementById('overlay');
    const hint = document.getElementById('hint');
    const mainCard = document.getElementById('main-card');
    let isPlaying = false;
    let musicStarted = false;

    function startMusic() {
      if (!musicStarted) {
        // First click: start music, remove overlay, enable card
        audio.play().then(() => {
          isPlaying = true;
          musicStarted = true;
          musicControl.classList.add('playing');
          overlay.classList.add('hidden');
          hint.classList.add('hidden');
          mainCard.classList.remove('disabled');
          mainCard.classList.add('enabled');
          // Switch onclick to toggle from now on
          musicControl.setAttribute('onclick', 'toggleMusic()');
          // Start typing animation
          typeQuestion();
        }).catch(() => {});
      }
    }

    function typeQuestion() {
      const questionEl = document.getElementById('question');
      const fullText = Array.from('Kamu suka aku gak? 🥺');
      let i = 0;
      questionEl.textContent = '';
      questionEl.classList.add('typing');

      const interval = setInterval(() => {
        questionEl.textContent += fullText[i];
        i++;
        if (i >= fullText.length) {
          clearInterval(interval);
          questionEl.classList.remove('typing');
          questionEl.classList.add('done');
          // Show buttons after typing is done
          document.querySelector('.btn-wrap').classList.add('show');
        }
      }, 80);
    }

    function typeAnswer() {
      const answerEl = document.getElementById('answer-title');
      const fullText = Array.from('yeayy aku juga suka sama kamu hehe 💖');
      let i = 0;
      answerEl.textContent = '';
      answerEl.classList.add('typing');

      const interval = setInterval(() => {
        answerEl.textContent += fullText[i];
        i++;
        if (i >= fullText.length) {
          clearInterval(interval);
          answerEl.classList.remove('typing');
          answerEl.classList.add('done');
        }
      }, 80);
    }

    function toggleMusic() {
      if (isPlaying) {
        audio.pause();
        isPlaying = false;
        musicControl.classList.remove('playing');
      } else {
        audio.play();
        isPlaying = true;
        musicControl.classList.add('playing');
      }
    }
  </script>
</body>

</html>
